databases:
  - name: mandel-db
    databaseName: mandel
    user: mandel
    plan: free

services:
  - type: web
    name: mandel-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mandel-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: web
    name: mandel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mandel-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
